name: Deploy demo to GitHub Pages

# Builds the playground (see playground/) as a static site and publishes it to
# GitHub Pages on every push to master. Enable once in repo Settings → Pages →
# "Build and deployment" → Source: GitHub Actions.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:demo
      - uses: actions/configure-pages@v5
        with:
          # Turn Pages on via the API if it isn't already, so the deploy doesn't
          # need the repo's Pages source to be flipped to "GitHub Actions" by hand.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
